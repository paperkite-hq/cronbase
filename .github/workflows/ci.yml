name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint & format check
        run: bun run check

      - name: Type check
        run: bunx --bun tsc --noEmit

      - name: Run tests with coverage
        run: bun test --coverage 2>&1 | tee /tmp/test-output.txt

      - name: Check coverage threshold
        run: |
          # Extract overall line coverage percentage
          LINE_COV=$(grep "All files" /tmp/test-output.txt | awk -F'|' '{gsub(/[[:space:]]/, "", $3); print $3}')
          FUNC_COV=$(grep "All files" /tmp/test-output.txt | awk -F'|' '{gsub(/[[:space:]]/, "", $2); print $2}')
          echo "Line coverage: ${LINE_COV}%"
          echo "Function coverage: ${FUNC_COV}%"

          # Fail if line coverage drops below 80%
          if [ "$(echo "$LINE_COV < 80" | bc)" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below 80% threshold"
            exit 1
          fi
          echo "Coverage check passed."

          # Generate shields.io endpoint badge JSON for dynamic coverage badge
          COV_INT=${LINE_COV%.*}
          if [ "$COV_INT" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COV_INT" -ge 80 ]; then COLOR="green";
          elif [ "$COV_INT" -ge 70 ]; then COLOR="yellowgreen";
          elif [ "$COV_INT" -ge 60 ]; then COLOR="yellow";
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${LINE_COV}%\",\"color\":\"${COLOR}\"}" > /tmp/coverage.json

      - name: Upload coverage badge data
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-badge
          path: /tmp/coverage.json

  docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run docs:build

      - name: Download coverage badge
        uses: actions/download-artifact@v8
        with:
          name: coverage-badge
          path: docs/.vitepress/dist

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
