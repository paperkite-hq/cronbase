name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint & format check
        run: bun run check

      - name: Type check
        run: bunx --bun tsc --noEmit

      - name: Run tests with coverage
        run: bun test --coverage 2>&1 | tee /tmp/test-output.txt

      - name: Check coverage threshold
        run: |
          # Extract overall line coverage percentage
          LINE_COV=$(grep "All files" /tmp/test-output.txt | awk -F'|' '{gsub(/[[:space:]]/, "", $3); print $3}')
          FUNC_COV=$(grep "All files" /tmp/test-output.txt | awk -F'|' '{gsub(/[[:space:]]/, "", $2); print $2}')
          echo "Line coverage: ${LINE_COV}%"
          echo "Function coverage: ${FUNC_COV}%"

          # Fail if line coverage drops below 80%
          if [ "$(echo "$LINE_COV < 80" | bc)" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below 80% threshold"
            exit 1
          fi
          echo "Coverage check passed."

  docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run docs:build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
