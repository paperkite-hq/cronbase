name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint & format check
        run: bun run check

      - name: Type check
        run: bunx --bun tsc --noEmit

      - name: Run tests
        run: bun test

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_password=${{ secrets.NPM_PASSWORD }}" > ~/.npmrc
          echo "//registry.npmjs.org/:username=paperkite-hq" >> ~/.npmrc
          echo "//registry.npmjs.org/:email=hello@paperkite.io" >> ~/.npmrc

      - name: Publish to npm
        run: npm publish
