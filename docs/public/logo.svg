<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock face ring (subtle) -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="20"/>
  <!-- 8 minor tick marks (opacity reduced) -->
  <g stroke="white" stroke-linecap="round" stroke-width="9" opacity="0.32">
    <line x1="354" y1="86" x2="330" y2="128"/>
    <line x1="426" y1="158" x2="400" y2="177"/>
    <line x1="426" y1="354" x2="400" y2="335"/>
    <line x1="354" y1="426" x2="330" y2="384"/>
    <line x1="158" y1="426" x2="182" y2="384"/>
    <line x1="86" y1="354" x2="112" y2="335"/>
    <line x1="86" y1="158" x2="112" y2="177"/>
    <line x1="158" y1="86" x2="182" y2="128"/>
  </g>
  <!-- 4 major tick marks at 12, 3, 6, 9 -->
  <line x1="256" y1="72" x2="256" y2="106" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="440" y1="256" x2="406" y2="256" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="440" x2="256" y2="406" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="72" y1="256" x2="106" y2="256" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Hour hand at 10 o'clock (300° clockwise from 12): endpoint (161, 201) -->
  <line x1="256" y1="256" x2="161" y2="201" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Minute hand at 2 o'clock (60° clockwise from 12): endpoint (384, 182) -->
  <line x1="256" y1="256" x2="384" y2="182" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="256" cy="256" r="24" fill="white"/>
  <circle cx="256" cy="256" r="12" fill="#3730a3"/>
</svg>
